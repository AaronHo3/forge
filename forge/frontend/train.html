<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ear Trainer - learn to hear music</title>
<style>
  :root { --bg:#0e0f13; --panel:#171922; --panel2:#1f2230; --ink:#e8eaf0; --muted:#9aa0b4;
    --accent:#5ad1ff; --accent2:#22d3a6; --line:#2a2e3e; --good:#22d3a6; --bad:#ff7a7a; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); min-height:100vh;
    font:16px/1.55 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  .top { padding:14px 22px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:14px; }
  .top h1 { margin:0; font-size:17px; } .top h1 span { color:var(--accent); }
  .top a { color:var(--muted); text-decoration:none; font-size:13px; }
  .top .mode { margin-left:auto; color:var(--muted); font-size:13px; cursor:pointer; }
  .top .mode:hover { color:var(--ink); }
  .stage { max-width:560px; margin:0 auto; padding:30px 20px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:26px; }
  .sub { color:var(--muted); font-size:14px; }
  .pill { display:inline-block; padding:4px 12px; border-radius:999px; background:var(--panel2);
    border:1px solid var(--line); color:var(--accent); font-size:12px; text-transform:uppercase; letter-spacing:.6px; }
  h2 { margin:14px 0 4px; font-size:23px; }
  audio { width:100%; margin:14px 0 6px; }
  .replay { width:100%; padding:12px; border:1px solid var(--line); background:var(--panel2);
    color:var(--ink); border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; }
  .replay:hover { border-color:var(--accent); }
  .opts { display:flex; flex-direction:column; gap:10px; margin-top:14px; }
  .opt { padding:14px 16px; background:var(--panel2); border:1px solid var(--line); border-radius:12px;
    font-size:15px; cursor:pointer; text-align:left; color:var(--ink); transition:border-color .15s; }
  .opt:hover { border-color:var(--accent); } .opt:disabled { cursor:default; }
  .opt.good { border-color:var(--good); background:rgba(34,211,166,.14); color:#bff3e4; }
  .opt.bad { border-color:var(--bad); background:rgba(255,122,122,.12); color:#ffd4d4; }
  .why { margin-top:16px; padding:14px 16px; border-radius:12px; background:var(--panel2); font-size:14px; }
  .why.good { border-left:3px solid var(--good); } .why.bad { border-left:3px solid var(--bad); } .why b { color:var(--ink); }
  button.primary { width:100%; margin-top:16px; padding:14px; border:0; border-radius:12px;
    background:var(--accent); color:#04222e; font-size:16px; font-weight:700; cursor:pointer; }
  .score { display:flex; gap:14px; justify-content:center; margin-bottom:16px; }
  .score div { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:8px 16px; text-align:center; min-width:78px; }
  .score .n { font-size:22px; font-weight:800; } .score .l { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
  .modes { display:flex; flex-direction:column; gap:10px; margin-top:8px; }
  .modebtn { padding:14px 16px; background:var(--panel2); border:1px solid var(--line); border-radius:12px;
    cursor:pointer; text-align:left; color:var(--ink); }
  .modebtn:hover { border-color:var(--accent); } .modebtn b { display:block; }
  .modebtn small { color:var(--muted); }
  .spinner { width:34px; height:34px; border:3px solid var(--line); border-top-color:var(--accent);
    border-radius:50%; animation:spin .8s linear infinite; margin:30px auto; } @keyframes spin { to { transform:rotate(360deg); } }
  .center { text-align:center; } .hide { display:none; }
</style>
<link rel="stylesheet" href="/app.css" />
<script src="/wave.js" defer></script>
</head>
<body class="p-train">
  <div class="top"><h1><span>🎧</span> Ear Trainer</h1><a href="/">← workbench</a>
    <span class="mode hide" id="changeMode">↺ change mode</span></div>
  <div class="stage">
    <div class="score hide" id="scoreBar">
      <div><div class="n" id="sCorrect">0</div><div class="l">correct</div></div>
      <div><div class="n" id="sTotal">0</div><div class="l">answered</div></div>
      <div><div class="n" id="sStreak">0</div><div class="l">streak 🔥</div></div>
    </div>

    <!-- MODE PICKER -->
    <div id="intro" class="card">
      <h2>Train your ears 🎶</h2>
      <p class="sub">No musical background needed. Pick what to practice - you'll hear a
        short clip and answer one question. You already feel these things; this names them.</p>
      <div class="modes" id="modes"></div>
    </div>

    <div id="loading" class="card center hide"><div class="spinner"></div><p class="sub" id="loadMsg">Loading…</p></div>

    <!-- QUESTION -->
    <div id="q" class="card hide">
      <span class="pill" id="dim">-</span>
      <h2 id="question">-</h2>
      <audio id="audio" controls preload="auto"></audio>
      <button class="replay" id="replay">🔊 Play again</button>
      <div class="opts" id="opts"></div>
      <div id="why" class="why hide"></div>
      <button class="primary hide" id="nextBtn">Next →</button>
    </div>
  </div>

<script>
const $ = id => document.getElementById(id);
let correct=0, total=0, streak=0, cur=null, category="mixed";

const MODES = [
  ["interval5oct", "🎵 5th vs Octave", "The easiest start - two famous intervals"],
  ["intervaleasy", "🎵 Intervals (easy)", "Major 3rd, 4th, 5th, octave"],
  ["intervalall",  "🎵 Intervals (all 12)", "The full set - for the brave"],
  ["chord",        "🎹 Major vs Minor", "Hear the difference in chords"],
  ["chordall",     "🎹 Chord quality", "Major / minor / diminished / augmented"],
  ["scale",        "🪜 Major vs Minor scale", "Hear a scale run up"],
  ["vibe",         "🌈 Vibe (mood / genre / tempo)", "Real generated music - MRT2"],
  ["mixed",        "🎲 Mixed beginner", "A bit of everything, easy mode"],
];

function setScore(){ $("sCorrect").textContent=correct; $("sTotal").textContent=total; $("sStreak").textContent=streak; }
function renderModes(){
  const box=$("modes"); box.innerHTML="";
  MODES.forEach(([key,title,desc])=>{
    const b=document.createElement("div"); b.className="modebtn";
    b.innerHTML=`<b>${title}</b><small>${desc}</small>`;
    b.onclick=()=>{ category=key; loadNext(); };
    box.appendChild(b);
  });
}

async function loadNext(){
  $("intro").classList.add("hide"); $("q").classList.add("hide");
  $("loadMsg").textContent = category==="vibe" ? "Composing a clip…" : "Loading…";
  $("loading").classList.remove("hide");
  cur = await (await fetch(`/api/train/next?category=${category}`)).json();
  $("loading").classList.add("hide");
  $("scoreBar").classList.remove("hide"); $("changeMode").classList.remove("hide");
  $("dim").textContent = cur.dimension;
  $("question").textContent = cur.question;
  $("audio").src = cur.clip_url;
  $("why").className="why hide"; $("nextBtn").classList.add("hide");
  const box=$("opts"); box.innerHTML="";
  cur.options.forEach((o,i)=>{ const b=document.createElement("button"); b.className="opt";
    b.textContent=o; b.onclick=()=>choose(i,b); box.appendChild(b); });
  $("q").classList.remove("hide");
  setTimeout(()=>{ $("audio").play().catch(()=>{}); }, 150);  // autoplay (post-interaction)
}

async function choose(i, btn){
  [...$("opts").children].forEach(b=>b.disabled=true);
  const res = await (await fetch("/api/train/answer",{method:"POST",
    headers:{"Content-Type":"application/json"}, body:JSON.stringify({token:cur.token, choice:i})})).json();
  total++;
  if(res.correct){ correct++; streak++; btn.classList.add("good"); }
  else { streak=0; btn.classList.add("bad"); $("opts").children[res.answer].classList.add("good"); }
  setScore();
  const why=$("why"); why.className="why "+(res.correct?"good":"bad");
  why.innerHTML=(res.correct?"✓ <b>Nice!</b> ":`<b>It was "${res.answer_text}".</b> `)+res.why;
  $("nextBtn").classList.remove("hide");
}

$("replay").onclick = ()=>{ const a=$("audio"); a.currentTime=0; a.play().catch(()=>{}); };
$("nextBtn").onclick = loadNext;
$("changeMode").onclick = ()=>{ $("q").classList.add("hide"); $("loading").classList.add("hide"); $("intro").classList.remove("hide"); };
renderModes(); setScore();
</script>
</body>
</html>
